name: pubup
description: >-
  Automatically update pubspec.yaml dependency constraints to the latest
  resolvable versions across Dart and Flutter workspace packages.
version: 0.6.0
homepage: https://github.com/joelbrostrom/pubup
repository: https://github.com/joelbrostrom/pubup
issue_tracker: https://github.com/joelbrostrom/pubup/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

platforms:
  windows:
  linux:
  macos:

executables:
  pubup:

dependencies:
  args: ^2.7.0
  http: ^1.6.0
  pub_semver: ^2.2.0
  pub_updater: ^0.5.0
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.1.0
  mocktail: ^1.0.5
  test: ^1.31.1